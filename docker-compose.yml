version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rafflix

  redis:
    image: redis:7

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - db

  beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
